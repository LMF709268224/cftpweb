<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CFtP 培训系统 - 金融科技专业认证</title>
    <meta name="description" content="CFtP (Chartered Fintech Practitioner) 专业金融科技认证培训平台" />
    <script src="https://js.stripe.com/v3/"></script>
  </head>
  <body>
    <div id="app">
      <style>
        .app-bootstrap-loading {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #eef8f7;
          color: #475569;
          font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .app-bootstrap-card {
          display: flex;
          align-items: center;
          gap: 12px;
          border: 1px solid #dbe8e6;
          border-radius: 18px;
          background: #ffffff;
          padding: 18px 22px;
          box-shadow: 0 18px 40px rgba(15, 74, 82, 0.08);
        }
        .app-bootstrap-spinner {
          width: 22px;
          height: 22px;
          border: 3px solid #cfe7e2;
          border-top-color: #36c39f;
          border-radius: 999px;
          animation: app-bootstrap-spin 0.8s linear infinite;
        }
        @keyframes app-bootstrap-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="app-bootstrap-loading">
        <div class="app-bootstrap-card">
          <div class="app-bootstrap-spinner"></div>
          <div>Loading preview...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
